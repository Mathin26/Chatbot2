<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --grad: linear-gradient(135deg, #6c63ff 0%, #9b59b6 100%);
      --primary: #6c63ff;
      --bg: #eef0f5;
      --surface: #ffffff;
      --border: #e0e3ea;
      --text: #1c1c2e;
      --muted: #7a7f9a;
      --user-bg: var(--grad);
      --ai-bg: #ffffff;
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f97316;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: var(--surface);
      border-radius: 24px;
      box-shadow: 0 12px 48px rgba(108,99,255,.15), 0 2px 8px rgba(0,0,0,.06);
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      height: 88vh;
      max-height: 860px;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────── */
    header {
      background: var(--grad);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .logo { font-size: 26px; }
    .header-info { flex: 1; }
    .header-info h1 { font-size: 17px; font-weight: 700; color: #fff; }
    .header-info p  { font-size: 11px; color: rgba(255,255,255,.75); margin-top: 2px; }

    .key-badge {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,.15);
      border-radius: 20px; padding: 5px 13px;
      font-size: 11px; color: #fff;
      white-space: nowrap; backdrop-filter: blur(4px);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--orange); transition: background .4s;
      flex-shrink: 0;
    }
    .dot.ok  { background: var(--green); }
    .dot.err { background: var(--red);   }

    /* ── Model picker ────────────────────────── */
    .toolbar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: #fafbfc;
      flex-shrink: 0;
    }
    .toolbar label {
      display: block; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .7px;
      color: var(--muted); margin-bottom: 5px;
    }
    #model-select {
      width: 100%; padding: 8px 12px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 13px; background: #fff; color: var(--text);
      cursor: pointer; outline: none; transition: border-color .2s;
    }
    #model-select:focus { border-color: var(--primary); }

    /* ── Messages ────────────────────────────── */
    #chat-box {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
      background: #f6f7fb;
    }
    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

    .welcome {
      margin: auto; text-align: center;
      color: var(--muted); padding: 30px 16px;
    }
    .welcome .wi { font-size: 44px; margin-bottom: 12px; }
    .welcome h3  { font-size: 15px; color: var(--text); margin-bottom: 6px; }
    .welcome p   { font-size: 13px; line-height: 1.6; }

    .msg {
      display: flex; flex-direction: column;
      max-width: 76%; animation: pop .18s ease;
    }
    @keyframes pop {
      from { opacity:0; transform: translateY(5px); }
      to   { opacity:1; transform: translateY(0);   }
    }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.ai   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 11px 15px; border-radius: 18px;
      font-size: 14px; line-height: 1.65; word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--grad); color: #fff;
      border-bottom-right-radius: 5px;
    }
    .msg.ai .bubble {
      background: #fff; color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .msg.ai.loading .bubble { color: var(--muted); }

    .meta {
      font-size: 10px; color: var(--muted);
      margin-top: 3px; padding: 0 4px;
    }

    /* typing animation */
    .dots span {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--muted); margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%,80%,100% { opacity:.2; transform:scale(.8); }
      40%          { opacity:1;  transform:scale(1);  }
    }

    /* ── Input bar ───────────────────────────── */
    .input-bar {
      padding: 14px 16px; border-top: 1px solid var(--border);
      background: #fff; display: flex; gap: 10px; align-items: center;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1; padding: 12px 18px;
      border: 1.5px solid var(--border); border-radius: 26px;
      font-size: 14px; outline: none; background: #f6f7fb;
      transition: border-color .2s, background .2s;
    }
    #user-input:focus { border-color: var(--primary); background: #fff; }
    #user-input:disabled { opacity: .5; }

    #send-btn {
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--grad); border: none; color: #fff;
      font-size: 19px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .2s, transform .12s;
    }
    #send-btn:hover   { opacity: .88; }
    #send-btn:active  { transform: scale(.93); }
    #send-btn:disabled { opacity: .38; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="card">

  <header>
    <div class="logo">🤖</div>
    <div class="header-info">
      <h1>AI Chatbot</h1>
      <p>Powered by OpenRouter · per-session keys</p>
    </div>
    <div class="key-badge">
      <div class="dot" id="dot"></div>
      <span id="key-status">Starting…</span>
    </div>
  </header>

  <div class="toolbar">
    <label for="model-select">Model</label>
    <select id="model-select">
      <optgroup label="Google">
        <option value="google/gemma-3-27b-it:free">Gemma 3 27B ⭐</option>
        <option value="google/gemma-3-12b-it:free">Gemma 3 12B</option>
        <option value="google/gemma-3-4b-it:free">Gemma 3 4B (Fast)</option>
        <option value="google/gemma-2-9b-it:free">Gemma 2 9B</option>
      </optgroup>
      <optgroup label="Meta">
        <option value="meta-llama/llama-4-scout:free">Llama 4 Scout 🆕</option>
        <option value="meta-llama/llama-4-maverick:free">Llama 4 Maverick 🆕</option>
        <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B</option>
        <option value="meta-llama/llama-3.1-8b-instruct:free">Llama 3.1 8B</option>
      </optgroup>
      <optgroup label="DeepSeek">
        <option value="deepseek/deepseek-chat-v3-0324:free">DeepSeek V3 Mar 2025 🆕</option>
        <option value="deepseek/deepseek-r1:free">DeepSeek R1 (Reasoning)</option>
        <option value="deepseek/deepseek-r1-zero:free">DeepSeek R1 Zero</option>
      </optgroup>
      <optgroup label="Mistral">
        <option value="mistralai/mistral-small-3.1-24b-instruct:free">Mistral Small 3.1 24B 🆕</option>
        <option value="mistralai/mistral-7b-instruct:free">Mistral 7B</option>
      </optgroup>
      <optgroup label="Qwen / Alibaba">
        <option value="qwen/qwen2.5-vl-72b-instruct:free">Qwen 2.5 VL 72B</option>
        <option value="qwen/qwen2.5-72b-instruct:free">Qwen 2.5 72B</option>
        <option value="qwen/qwen-2-7b-instruct:free">Qwen 2 7B</option>
      </optgroup>
      <optgroup label="Microsoft">
        <option value="microsoft/phi-4:free">Phi-4 🆕</option>
        <option value="microsoft/phi-3-mini-128k-instruct:free">Phi-3 Mini</option>
      </optgroup>
      <optgroup label="Other">
        <option value="nvidia/llama-3.1-nemotron-70b-instruct:free">NVIDIA Nemotron 70B</option>
        <option value="openchat/openchat-7b:free">OpenChat 7B</option>
      </optgroup>
    </select>
  </div>

  <div id="chat-box">
    <div class="welcome">
      <div class="wi">💬</div>
      <h3>Ask me anything</h3>
      <p>Each visitor gets their own session key.<br>No shared rate limits.</p>
    </div>
  </div>

  <div class="input-bar">
    <input id="user-input" type="text" placeholder="Type your message and press Enter…"
           autocomplete="off" disabled />
    <button id="send-btn" disabled>➤</button>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
